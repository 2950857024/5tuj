<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X4G - Subscription</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Outfit', sans-serif;
        background: #080c16;
        color: #fff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
    }
    .container {
        width: 100%;
        max-width: 500px;
    }
    .card {
        background: #121826;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 30px 24px;
        margin-bottom: 20px;
    }
    .card-header {
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding-bottom: 20px;
        margin-bottom: 20px;
    }
    .avatar {
        width: 64px;
        height: 64px;
        background: #2563eb;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
        font-size: 24px;
    }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { color: #8b949e; font-size: 13px; margin-top: 4px; word-break: break-all; }
    .badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
        background: rgba(16,185,129,0.1);
        color: #6ee7b7;
        border: 1px solid rgba(16,185,129,0.2);
    }
    .badge.error { background: rgba(239,68,68,0.1); color: #fca5a5; border-color: rgba(239,68,68,0.2); }
    .badge.loading { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: rgba(59,130,246,0.2); }
    .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
    }
    .stat-box {
        background: #0d1117;
        border: 1px solid #2d3748;
        border-radius: 10px;
        padding: 12px 14px;
    }
    .stat-box .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
    .stat-box .value { font-size: 14px; font-weight: 600; color: #e5e7eb; }
    .entry {
        background: #0d1117;
        border: 1px solid #2d3748;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-name { font-weight: 600; font-size: 13px; }
    .entry-detail { font-size: 11px; color: #6b7280; font-family: 'Fira Code', monospace; }
    .entry-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #1a202c;
        border: 1px solid #2d3748;
        color: #8b949e;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    .btn-icon:hover { border-color: #3b82f6; color: #fff; background: rgba(59,130,246,0.1); }
    .qr-box {
        display: none;
        justify-content: center;
        padding-top: 14px;
        margin-top: 14px;
        border-top: 1px dashed #2d3748;
    }
    .qr-box.show { display: flex; }
    .qr-box > div { background: #fff; padding: 10px; border-radius: 10px; }
    .hidden { display: none !important; }
    .empty { text-align: center; color: #64748b; padding: 30px 0; }
    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #10b981;
        color: #052e21;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 13px;
        z-index: 999;
        animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translate(-50%, 20px); }
        to { opacity: 1; transform: translate(-50%, 0); }
    }
    .info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #8b949e; }
    .info-value { color: #e5e7eb; font-family: 'Fira Code', monospace; font-size: 12px; }
    .proto-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        margin-bottom: 8px;
    }
    .proto-name { width: 80px; font-weight: 600; font-family: 'Fira Code', monospace; }
    .proto-track { flex: 1; height: 6px; background: #1a202c; border-radius: 999px; overflow: hidden; }
    .proto-fill { height: 100%; border-radius: 999px; }
    .proto-count { font-family: 'Fira Code', monospace; color: #64748b; width: 24px; text-align: right; }
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <div class="avatar"><i class="fas fa-shield-halved"></i></div>
            <div class="title" id="userTitle">Your Account</div>
            <div class="subtitle" id="statusMsg">Loading subscription...</div>
            <div class="badge loading" id="statusBadge">⏳ Loading</div>
        </div>
        
        <div id="infoSection">
            <div class="info-row">
                <span class="info-label"><i class="fas fa-envelope" style="color:#3b82f6;"></i> Email</span>
                <span class="info-value" id="infoEmail">-</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-fingerprint" style="color:#3b82f6;"></i> UUID</span>
                <span class="info-value" id="infoUUID">-</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-server" style="color:#3b82f6;"></i> Address</span>
                <span class="info-value" id="infoAddress">-</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-plug" style="color:#3b82f6;"></i> Status</span>
                <span class="info-value" id="infoStatus" style="color:#6ee7b7;">● Enabled</span>
            </div>
        </div>
        
        <div id="usageSection" class="hidden" style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <span style="font-size:13px;font-weight:500;"><i class="fas fa-chart-pie" style="color:#3b82f6;"></i> Data Usage</span>
                <span style="font-size:14px;font-weight:700;" id="usageText">-</span>
            </div>
            <div class="progress-track" style="width:100%;background:#1a202c;border-radius:999px;height:8px;overflow:hidden;border:1px solid #2d3748;">
                <div class="progress-fill" id="usageFill" style="width:0%;height:100%;background:#3b82f6;border-radius:999px;transition:width 0.5s;"></div>
            </div>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="label"><i class="fas fa-calendar-days" style="color:#3b82f6;"></i> Expires</div>
                    <div class="value" id="expireDate">-</div>
                </div>
                <div class="stat-box">
                    <div class="label"><i class="fas fa-hourglass-half" style="color:#3b82f6;"></i> Days Left</div>
                    <div class="value" id="daysLeft">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card" id="configsCard">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="font-size:14px;color:#8b949e;"><i class="fas fa-link" style="color:#3b82f6;"></i> Configs <span id="countBadge">(0)</span></h2>
            <button class="btn-icon" id="copyAllBtn" title="Copy All"><i class="fas fa-copy"></i></button>
        </div>
        <div id="configsList"></div>
        <div class="empty hidden" id="emptyMsg">No configs found</div>
    </div>
</div>

<script>
// ====== لیست کامل همه کلاینت‌ها ======
const ALL_CLIENTS = [
    {
        id: 'fqnpgcsvvuksjv3k',
        email: 'adweypu67d',
        uuid: '861c4ead-11d8-43ef-9f19-405408e7a915',
        address: '5tuj-production.up.railway.app',
        port: '8080',
        path: '/',
        host: '5tuj-production.up.railway.app',
        password: 'bv22qzu3g0e97y1l',
        auth: 'bovm4dszwhlpzkcd'
    },
    {
        id: 'txctcczehekbjlkq',
        email: '2i26ggip4n',
        uuid: '91ee0eab-6f58-4841-9421-138a27f7d00b',
        address: '5tuj-production.up.railway.app',
        port: '8080',
        path: '/',
        host: '5tuj-production.up.railway.app'
    },
    {
        id: 'ufa7zpn9',
        email: 'ufa7zpn9',
        uuid: 'bbf1d118-aecd-408a-94fa-717cc6746aff',
        address: '5tuj-production.up.railway.app',
        port: '8080',
        path: '/',
        host: '5tuj-production.up.railway.app'
    },
    {
        id: 'z7k8oqou',
        email: 'z7k8oqou',
        uuid: '5d88e790-a966-4a50-a34d-90acb6129313',
        address: '5tuj-production.up.railway.app',
        port: '8080',
        path: '/',
        host: '5tuj-production.up.railway.app'
    }
];

// ====== ساخت لینک VLESS ======
function getVLESSLink(config) {
    return `vless://${config.uuid}@${config.address}:${config.port}?encryption=none&security=none&type=ws&host=${config.host}&path=${config.path}#${config.email}`;
}

// ====== تشخیص پروتکل ======
function detectProtocol(uri) {
    if (uri.startsWith('vless://')) return { key: 'vless', label: 'VLESS', icon: 'fa-bolt', color: '#3b82f6' };
    if (uri.startsWith('vmess://')) return { key: 'vmess', label: 'VMESS', icon: 'fa-shuffle', color: '#a78bfa' };
    if (uri.startsWith('trojan://')) return { key: 'trojan', label: 'TROJAN', icon: 'fa-mask', color: '#ec4899' };
    return { key: 'other', label: 'UNKNOWN', icon: 'fa-link', color: '#8b949e' };
}

// ====== یافتن کلاینت با شناسه ======
function findClient(id) {
    return ALL_CLIENTS.find(c => c.id === id || c.email === id);
}

// ====== یافتن کلاینت‌های با شناسه‌های خاص ======
function findClients(ids) {
    return ALL_CLIENTS.filter(c => ids.includes(c.id) || ids.includes(c.email));
}

// ====== Toast ======
function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
}

// ====== وضعیت ======
function setBadge(state, text) {
    const badge = document.getElementById('statusBadge');
    badge.className = 'badge';
    if (state === 'active') badge.classList.add('active');
    else if (state === 'error') badge.classList.add('error');
    else badge.classList.add('loading');
    badge.textContent = text;
}

function setStatus(text) {
    document.getElementById('statusMsg').textContent = text;
}

// ====== نمایش ======
function renderEntries(links, clients) {
    const list = document.getElementById('configsList');
    const countBadge = document.getElementById('countBadge');
    const emptyMsg = document.getElementById('emptyMsg');
    
    list.innerHTML = '';
    
    if (!links || links.length === 0) {
        emptyMsg.classList.remove('hidden');
        countBadge.textContent = '(0)';
        return;
    }
    
    emptyMsg.classList.add('hidden');
    countBadge.textContent = `(${links.length})`;
    
    links.forEach((link, idx) => {
        const proto = detectProtocol(link);
        const div = document.createElement('div');
        div.className = 'entry';
        
        const name = link.split('#').pop() || proto.label;
        const sub = link.split('://')[1]?.split('?')[0] || '';
        
        div.innerHTML = `
            <div class="entry-info">
                <div class="entry-name"><span style="color:${proto.color}">●</span> ${name}</div>
                <div class="entry-detail">${sub.substring(0, 40)}${sub.length > 40 ? '...' : ''}</div>
            </div>
            <div class="entry-actions">
                <button class="btn-icon qr-btn" data-idx="${idx}"><i class="fas fa-qrcode"></i></button>
                <button class="btn-icon copy-btn" data-link="${link}"><i class="fas fa-copy"></i></button>
            </div>
            <div class="qr-box" id="qr-${idx}"><div id="qr-canvas-${idx}"></div></div>
        `;
        
        list.appendChild(div);
        
        div.querySelector('.copy-btn').addEventListener('click', function() {
            navigator.clipboard.writeText(this.dataset.link).then(() => toast('Copied!'));
        });
        
        div.querySelector('.qr-btn').addEventListener('click', function() {
            const box = document.getElementById(`qr-${idx}`);
            const showing = box.classList.contains('show');
            box.classList.toggle('show', !showing);
            const canvas = document.getElementById(`qr-canvas-${idx}`);
            if (!showing && canvas.childElementCount === 0) {
                new QRCode(canvas, { text: link, width: 160, height: 160, colorDark: '#0B0E13', colorLight: '#fff' });
            }
        });
    });
}

// ====== لود کردن ======
function loadSubscription(id) {
    // اگر id = all باشد، همه کلاینت‌ها را نمایش بده
    if (id === 'all' || id === 'ALL') {
        const links = ALL_CLIENTS.map(c => getVLESSLink(c));
        document.getElementById('userTitle').textContent = `All Clients (${ALL_CLIENTS.length})`;
        document.getElementById('infoEmail').textContent = 'Multiple';
        document.getElementById('infoUUID').textContent = '-';
        document.getElementById('infoAddress').textContent = '5tuj-production.up.railway.app:8080';
        document.getElementById('infoStatus').textContent = '● Active';
        document.getElementById('infoStatus').style.color = '#6ee7b7';
        setStatus(`Showing ${ALL_CLIENTS.length} configs`);
        setBadge('active', `✅ ${ALL_CLIENTS.length} Configs`);
        renderEntries(links, ALL_CLIENTS);
        return;
    }
    
    // پیدا کردن کلاینت
    const client = findClient(id);
    
    if (!client) {
        setStatus('Invalid subscription ID');
        setBadge('error', '❌ Invalid');
        document.getElementById('configsList').innerHTML = '';
        document.getElementById('emptyMsg').classList.remove('hidden');
        document.getElementById('infoEmail').textContent = '-';
        document.getElementById('infoUUID').textContent = '-';
        document.getElementById('infoAddress').textContent = '-';
        document.getElementById('userTitle').textContent = 'Not Found';
        return;
    }
    
    setStatus(`Loading ${client.email}...`);
    setBadge('loading', '⏳ Loading');
    
    // آپدیت اطلاعات
    document.getElementById('userTitle').textContent = client.email;
    document.getElementById('infoEmail').textContent = client.email;
    document.getElementById('infoUUID').textContent = client.uuid;
    document.getElementById('infoAddress').textContent = `${client.address}:${client.port}`;
    document.getElementById('infoStatus').textContent = '● Enabled';
    document.getElementById('infoStatus').style.color = '#6ee7b7';
    
    const link = getVLESSLink(client);
    const links = [link];
    
    renderEntries(links, [client]);
    setStatus(`Ready (${client.email})`);
    setBadge('active', '✅ Active');
    
    // Usage
    document.getElementById('usageSection').classList.remove('hidden');
    document.getElementById('usageText').innerHTML = '0 B <span style="font-size:12px;color:#8b949e;font-weight:400;">of unlimited</span>';
    document.getElementById('usageFill').style.width = '0%';
    document.getElementById('expireDate').textContent = 'Unlimited';
    document.getElementById('daysLeft').textContent = 'Unlimited';
}

// ====== کپی همه ======
document.getElementById('copyAllBtn').addEventListener('click', function() {
    const links = [];
    document.querySelectorAll('.copy-btn').forEach(btn => {
        links.push(btn.dataset.link);
    });
    if (links.length > 0) {
        navigator.clipboard.writeText(links.join('\n')).then(() => toast(`${links.length} configs copied!`));
    }
});

// ====== شروع ======
(function() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id') || params.get('email');
    
    if (!id) {
        const path = window.location.pathname;
        const parts = path.split('/');
        const last = parts[parts.length - 1];
        if (last && last !== 'sub' && last !== 'sub-link.html') {
            id = last;
        }
    }
    
    if (!id) {
        id = 'fqnpgcsvvuksjv3k';
    }
    
    loadSubscription(id);
})();
</script>
</body>
</html>
