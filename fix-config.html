<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Config · VLESS & Trojan</title>
    <!-- Google Fonts: Outfit for UI, Fira Code for configs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #080c16;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            user-select: none;
            position: relative;
            overflow-y: auto;
        }
        .ambient-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 15% 30%, rgba(37, 99, 235, 0.15) 0%, transparent 45%),
                        radial-gradient(circle at 85% 60%, rgba(255, 100, 100, 0.03) 0%, transparent 40%);
            z-index: 1;
        }
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
            pointer-events: none;
        }
        .login-box {
            width: 620px;
            max-width: 100%;
            background-color: #121826;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 40px 32px;
            z-index: 10;
            box-shadow: 0 0 60px 10px rgba(29, 78, 216, 0.12);
            position: relative;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-text {
            color: #3b82f6;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .divider {
            width: 32px;
            height: 3px;
            background-color: #3b82f6;
            margin: 0 auto 16px auto;
            border-radius: 3px;
        }
        .title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 14px;
            font-weight: 300;
            margin-top: 6px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #f3f4f6;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .label-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .clear-btn {
            background: none;
            border: 1px solid #2d3748;
            color: #8b949e;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .clear-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
            background-color: rgba(239,68,68,0.1);
        }
        .protocol-badge {
            background-color: #1a202c;
            border: 1px solid #2d3748;
            color: #8b949e;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }
        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon-left {
            position: absolute;
            left: 16px;
            color: #6b7280;
            font-size: 16px;
            pointer-events: none;
            top: 16px;
        }
        .input-field {
            width: 100%;
            background-color: #1a202c;
            color: #e5e7eb;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            padding: 16px 16px 16px 44px;
            border: 1px solid #2d3748;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
            resize: vertical;
            min-height: 80px;
            line-height: 1.6;
        }
        .input-field::placeholder {
            color: #4a5568;
            font-family: 'Outfit', sans-serif;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        /* ---- settings row ---- */
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            background: #0f1623;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .settings-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }
        .settings-row select {
            background: #1a202c;
            border: 1px solid #2d3748;
            color: #e5e7eb;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .settings-row select:focus {
            border-color: #3b82f6;
        }
        .settings-row .fp-label {
            color: #94a3b8;
            font-weight: 400;
        }
        .login-btn {
            width: 100%;
            background-color: #2563eb;
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        .login-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            background-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result-area {
            margin-top: 28px;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .result-area.show { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: #f3f4f6;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .result-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: none;
            border: 1px solid #2d3748;
            color: #8b949e;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .action-btn:hover {
            border-color: #3b82f6;
            color: #ffffff;
            background-color: rgba(59,130,246,0.1);
        }
        .action-btn.copied {
            border-color: #10b981;
            color: #10b981;
            background-color: rgba(16,185,129,0.1);
        }
        .result-box {
            background-color: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #e5e7eb;
            word-break: break-all;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .changelog {
            margin-top: 14px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
            font-weight: 400;
        }
        .status-msg {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .status-msg.show { display: block; animation: fadeIn 0.3s ease; }
        .status-msg.error {
            background-color: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }
        .status-msg.success {
            background-color: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: #6ee7b7;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .spinner.active { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @media (max-width: 600px) {
            .login-box { padding: 30px 20px; }
            .title { font-size: 24px; }
            .input-field, .result-box { font-size: 12px; }
            .settings-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="ambient-glow"></div>
<div class="grid-bg"></div>

<div class="login-box">
    <div class="header">
        <div class="logo-text">🔧 Fix Config</div>
        <div class="divider"></div>
        <div class="title">VLESS & Trojan Fixer</div>
        <div class="subtitle">Domain to IP + TLS · SNI · Fingerprint</div>
    </div>

    <form id="fixForm">
        <div class="input-group">
            <label class="label">
                <span>Enter your configuration</span>
                <div class="label-actions">
                    <span class="protocol-badge" id="protocolBadge">—</span>
                    <button type="button" class="clear-btn" id="clearBtn">🗑️ Clear</button>
                </div>
            </label>
            <div class="input-container">
                <span class="input-icon-left">📋</span>
                <textarea class="input-field" id="configInput" placeholder="Paste VLESS or Trojan config here..." rows="3"></textarea>
            </div>
        </div>

        <!-- SETTINGS: Fingerprint selector -->
        <div class="settings-row">
            <label>
                <span class="fp-label">🖐️ Fingerprint</span>
                <select id="fpSelect">
                    <option value="ios" selected>ios</option>
                    <option value="chrome">chrome</option>
                    <option value="firefox">firefox</option>
                    <option value="safari">safari</option>
                    <option value="edge">edge</option>
                    <option value="random">random</option>
                    <option value="none">none (skip)</option>
                </select>
            </label>
            <label style="color:#64748b; font-size:12px; font-weight:300;">
                ⚡ applied to fixed config
            </label>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">
            <span id="btnText">🔄 Fix Config</span>
            <span class="spinner" id="loadingSpinner"></span>
        </button>
    </form>

    <div id="statusMsg" class="status-msg"></div>

    <div class="result-area" id="resultArea">
        <div class="result-label">
            <span>✅ Fixed Configuration</span>
            <div class="result-actions">
                <button class="action-btn" id="copyBtn">📋 Copy</button>
                <button class="action-btn" id="downloadBtn">💾 Download</button>
            </div>
        </div>
        <div class="result-box" id="resultBox"></div>
        <div class="changelog">
            🔄 Domain → IP · Port 443 · TLS · SNI fixed · Fingerprint from setting
        </div>
    </div>
</div>

<script>
    (function() {
        const configInput = document.getElementById('configInput');
        const protocolBadge = document.getElementById('protocolBadge');
        const clearBtn = document.getElementById('clearBtn');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('loadingSpinner');
        const statusMsg = document.getElementById('statusMsg');
        const resultArea = document.getElementById('resultArea');
        const resultBox = document.getElementById('resultBox');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const fpSelect = document.getElementById('fpSelect');

        // ---- detect protocol on input ----
        configInput.addEventListener('input', function() {
            const input = this.value.trim();
            const protocols = { 'vless': '🚀 VLESS', 'trojan': '🛡️ TROJAN' };
            let detected = '—';
            for (const [key, label] of Object.entries(protocols)) {
                if (input.startsWith(key + '://')) { detected = label; break; }
            }
            protocolBadge.textContent = detected;
        });

        // ---- clear ----
        clearBtn.addEventListener('click', function() {
            configInput.value = '';
            configInput.focus();
            protocolBadge.textContent = '—';
            resultArea.classList.remove('show');
            statusMsg.className = 'status-msg';
            statusMsg.textContent = '';
        });

        // ---- download ----
        downloadBtn.addEventListener('click', function() {
            const text = resultBox.textContent;
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fixed-config.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // ---- copy (manual) ----
        copyBtn.addEventListener('click', async function() {
            const text = resultBox.textContent;
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                this.textContent = '✅ Copied!';
                this.className = 'action-btn copied';
                setTimeout(() => {
                    this.textContent = '📋 Copy';
                    this.className = 'action-btn';
                }, 2000);
            } catch {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                this.textContent = '✅ Copied!';
                this.className = 'action-btn copied';
                setTimeout(() => {
                    this.textContent = '📋 Copy';
                    this.className = 'action-btn';
                }, 2000);
            }
        });

        // ---- helpers ----
        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = 'status-msg show ' + type;
        }

        // ---- parse config ----
        function parseConfig(config) {
            try {
                const protocol = config.split('://')[0];
                const rest = config.substring(protocol.length + 3);
                if (!['vless', 'trojan'].includes(protocol)) return null;

                let remark = '';
                let configPart = rest;
                const hashIndex = rest.lastIndexOf('#');
                if (hashIndex !== -1) {
                    remark = decodeURIComponent(rest.substring(hashIndex + 1));
                    configPart = rest.substring(0, hashIndex);
                }

                const parsed = { protocol, remark, original: config, isIP: false };

                if (protocol === 'vless') {
                    const atIndex = configPart.indexOf('@');
                    if (atIndex === -1) return null;
                    parsed.uuid = configPart.substring(0, atIndex);
                    let hostAndPort = '', queryString = '';
                    const questionIndex = configPart.indexOf('?');
                    if (questionIndex !== -1) {
                        hostAndPort = configPart.substring(atIndex + 1, questionIndex);
                        queryString = configPart.substring(questionIndex + 1);
                    } else {
                        hostAndPort = configPart.substring(atIndex + 1);
                    }
                    // handle IPv6 bracket
                    if (hostAndPort.startsWith('[')) {
                        const bracketEnd = hostAndPort.indexOf(']');
                        parsed.host = hostAndPort.substring(0, bracketEnd + 1);
                        parsed.port = hostAndPort.substring(bracketEnd + 2) || '443';
                    } else {
                        const hostParts = hostAndPort.split(':');
                        parsed.host = hostParts[0];
                        parsed.port = hostParts[1] || '443';
                    }
                    const params = new URLSearchParams(queryString);
                    parsed.encryption = params.get('encryption') || 'none';
                    parsed.type = params.get('type') || 'ws';
                    parsed.path = params.get('path') || '/';
                    parsed.security = params.get('security') || 'none';
                    parsed.sni = params.get('sni') || '';
                    parsed.fp = params.get('fp') || '';
                    parsed.host_header = params.get('host') || parsed.host;
                    parsed.query = queryString;
                    parsed.params = params;
                } else if (protocol === 'trojan') {
                    const atIndex = configPart.indexOf('@');
                    if (atIndex === -1) return null;
                    parsed.password = configPart.substring(0, atIndex);
                    let afterAt = '', queryString = '';
                    const questionIndex = configPart.indexOf('?');
                    if (questionIndex !== -1) {
                        afterAt = configPart.substring(atIndex + 1, questionIndex);
                        queryString = configPart.substring(questionIndex + 1);
                    } else {
                        afterAt = configPart.substring(atIndex + 1);
                    }
                    if (afterAt.startsWith('[')) {
                        const bracketEnd = afterAt.indexOf(']');
                        parsed.host = afterAt.substring(0, bracketEnd + 1);
                        parsed.port = afterAt.substring(bracketEnd + 2) || '443';
                    } else {
                        const hostParts = afterAt.split(':');
                        parsed.host = hostParts[0];
                        parsed.port = hostParts[1] || '443';
                    }
                    const params = new URLSearchParams(queryString);
                    parsed.security = params.get('security') || 'none';
                    parsed.sni = params.get('sni') || '';
                    parsed.fp = params.get('fp') || '';
                    parsed.type = params.get('type') || 'tcp';
                    parsed.query = queryString;
                    parsed.params = params;
                }

                const isIPv4 = /^(\d{1,3}\.){3}\d{1,3}$/.test(parsed.host);
                const isIPv6 = /^\[.*\]$/.test(parsed.host) || /^[a-fA-F0-9:]+$/.test(parsed.host);
                parsed.isIP = isIPv4 || isIPv6;
                return parsed;
            } catch { return null; }
        }

        // ---- build fixed config with fp from setting ----
        function buildFixedConfig(parsed, ipAddress, fpValue) {
            const protocol = parsed.protocol;
            if (protocol === 'vless') {
                let newConfig = 'vless://' + parsed.uuid + '@' + ipAddress + ':443?';
                const params = new URLSearchParams();
                params.set('encryption', parsed.encryption || 'none');
                params.set('security', 'tls');
                params.set('sni', parsed.host.replace(/[\[\]]/g, ''));
                // apply fingerprint from setting (if not 'none')
                if (fpValue && fpValue !== 'none') params.set('fp', fpValue);
                else if (fpValue === 'none') params.delete('fp');
                else params.set('fp', 'ios');
                params.set('insecure', '0');
                params.set('type', parsed.type || 'ws');
                params.set('host', parsed.host_header || parsed.host);
                if (parsed.path) params.set('path', parsed.path);
                if (parsed.params) {
                    for (const [key, value] of parsed.params) {
                        if (!['encryption','security','sni','fp','insecure','allowInsecure','type','host','path'].includes(key)) {
                            params.set(key, value);
                        }
                    }
                }
                newConfig += params.toString();
                if (parsed.remark) newConfig += '#' + encodeURIComponent(parsed.remark);
                return newConfig;
            } else if (protocol === 'trojan') {
                let newConfig = 'trojan://' + parsed.password + '@' + ipAddress + ':443?';
                const params = new URLSearchParams();
                params.set('security', 'tls');
                params.set('sni', parsed.host.replace(/[\[\]]/g, ''));
                if (fpValue && fpValue !== 'none') params.set('fp', fpValue);
                else if (fpValue === 'none') params.delete('fp');
                else params.set('fp', 'ios');
                params.set('type', parsed.type || 'tcp');
                if (parsed.params) {
                    for (const [key, value] of parsed.params) {
                        if (!['security','sni','fp','type'].includes(key)) {
                            params.set(key, value);
                        }
                    }
                }
                newConfig += params.toString();
                if (parsed.remark) newConfig += '#' + encodeURIComponent(parsed.remark);
                return newConfig;
            }
            return parsed.original;
        }

        // ---- main fix ----
        async function fixConfig(config, fpValue) {
            const parsed = parseConfig(config);
            if (!parsed) return { error: 'Invalid config format or structure is broken.' };

            let ipAddress = parsed.host;
            if (!parsed.isIP) {
                try {
                    const response = await fetch(`https://dns.google/resolve?name=${parsed.host}&type=A`);
                    const data = await response.json();
                    if (data.Answer && data.Answer.length > 0) {
                        const ip = data.Answer.find(r => r.type === 1)?.data;
                        if (ip && /^(\d{1,3}\.){3}\d{1,3}$/.test(ip)) {
                            ipAddress = ip;
                        } else {
                            return { error: 'IP address (A record) not found for this domain.' };
                        }
                    } else {
                        return { error: 'Domain cannot be resolved via DNS.' };
                    }
                } catch (error) {
                    return { error: 'DNS resolution error: ' + error.message };
                }
            }
            const fixed = buildFixedConfig(parsed, ipAddress, fpValue);
            return fixed;
        }

        // ---- form submit ----
        document.getElementById('fixForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const input = configInput.value.trim();
            const fpValue = fpSelect.value;

            statusMsg.className = 'status-msg';
            statusMsg.textContent = '';
            resultArea.classList.remove('show');
            copyBtn.textContent = '📋 Copy';
            copyBtn.className = 'action-btn';

            if (!input) { showStatus('Please enter a config first', 'error'); return; }
            const supported = ['vless://', 'trojan://'];
            if (!supported.some(p => input.startsWith(p))) {
                showStatus('❌ Invalid config format. Only VLESS & Trojan are supported.', 'error');
                return;
            }

            submitBtn.disabled = true;
            btnText.textContent = 'Processing...';
            spinner.classList.add('active');

            try {
                const result = await fixConfig(input, fpValue);
                if (result.error) {
                    showStatus(result.error, 'error');
                    return;
                }
                resultBox.textContent = result;
                resultArea.classList.add('show');
                showStatus('✅ Config fixed successfully!', 'success');
                // auto copy
                try {
                    await navigator.clipboard.writeText(result);
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.className = 'action-btn copied';
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                        copyBtn.className = 'action-btn';
                    }, 3000);
                } catch { /* ignore */ }
            } catch (error) {
                showStatus('❌ Error fixing config: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = '🔄 Fix Config';
                spinner.classList.remove('active');
            }
        });
    })();
</script>
</body>
</html>
